{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login | Mr Snow Ice Cream</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("{% static 'images/login-bg.jpg' %}");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

.login-container h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#ff6600;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

.signup{
text-align:center;
margin-top:15px;
}

.signup a{
color:#ff6600;
text-decoration:none;
font-weight:bold;
}

.error{
color:red;
text-align:center;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Mr Snow Ice Cream Login</h2>

{% if messages %}
{% for message in messages %}
<p class="error">{{ message }}</p>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}


{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="signup">
<p>New user? <a href="/signup/">Create Account</a></p>
</div>

</div>

</body>
</html>
