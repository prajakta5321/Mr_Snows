{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* PAGE BACKGROUND */

body{
background:linear-gradient(135deg,#e8edf5,#d7dbe6);
padding:40px;
}

/* MAIN LAYOUT */

.container{
width:85%;
margin:auto;
display:flex;
gap:40px;
}

/* LEFT FORM */

.left{
flex:2;
background:rgba(255,255,255,0.8);
padding:35px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
backdrop-filter:blur(10px);
}

/* RIGHT CART */

.right{
flex:1;
background:rgba(255,255,255,0.8);
padding:25px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

/* TITLES */

h2{
margin-bottom:20px;
}

h3{
margin-bottom:15px;
}

/* INPUTS */

input, textarea, select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:80px;
}

/* ROW INPUT */

.row{
display:flex;
gap:15px;
}

.row input{
flex:1;
}

/* CART ITEM */

.cart-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

/* TOTAL */

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

/* BUTTON */

button{
background:linear-gradient(90deg,#ff6f91,#ff4d6d);
color:white;
border:none;
padding:14px;
width:100%;
border-radius:30px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<h2>Checkout</h2>

<form method="POST">

{% csrf_token %}

<h3>Contact Information</h3>

<input type="text" name="customer_name" placeholder="Full Name" required>

<div class="row">
<input type="email" name="email" placeholder="Email Address" required>
<input type="text" name="phone" placeholder="Phone Number" required>
</div>

<h3>Shipping Address</h3>

<textarea name="address" placeholder="Street Address" required></textarea>

<div class="row">
<input type="text" name="city" placeholder="City" required>
<input type="text" name="state" placeholder="State" required>
</div>

<div class="row">
<input type="text" name="pincode" placeholder="Pincode" required>
<input type="text" name="country" placeholder="Country" value="India">
</div>

<h3>Payment Method</h3>

<select name="payment_method">
<option value="cod">Cash on Delivery</option>
<option value="upi">UPI</option>
<option value="card">Debit / Credit Card</option>
</select>

<button type="submit">Place Order</button>

</form>

</div>

<!-- RIGHT SIDE CART -->

<div class="right">

<h3>Your Cart</h3>

{% for item in cart_items %}

<div class="cart-item">

<span>
{{ item.product.name }} × {{ item.quantity }}
</span>

<span>
₹{{ item.price }}
</span>

</div>

{% endfor %}

<hr>

<div class="total">
Total Amount: ₹{{ total }}
</div>

</div>

</div>

</body>
</html>
