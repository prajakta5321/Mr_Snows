<!DOCTYPE html>
<html>
<head>
    <title>Shop Order</title>
</head>
<body>

<h2>Shop Order Panel 🍦</h2>

<form method="POST">
    <label>Table No:</label>
    <input type="text" name="table" required><br><br>

    <label>Flavour:</label>
    <select name="flavour">
        <option>Vanilla</option>
        <option>Chocolate</option>
        <option>Strawberry</option>
        <option>Mango</option>
        <option>Butterscotch</option>
    </select><br><br>

    <label>Type:</label>
    <select name="type">
        <option value="scoop">Scoop - ₹40</option>
        <option value="cone">Cone - ₹60</option>
        <option value="bowl">Bowl - ₹80</option>
        <option value="family">Family Pack - ₹250</option>
    </select><br><br>

    <label>Quantity:</label>
    <input type="number" name="qty" min="1" required><br><br>

    <button type="submit">Place Order</button>
</form>

<br>
<a href="/logout">Logout</a>

</body>
</html>
